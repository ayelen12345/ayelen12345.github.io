<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Dominó 4 Jugadores_jaure</title>

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    font-family:Arial, sans-serif;
    background:#a7d8ff;
    height:100vh;
    overflow:hidden;
}

#mesa{
    width:100%;
    height:100vh;
    display:flex;
    flex-direction:column;
    align-items:center;
    justify-content:space-between;
    padding:20px;
}

h1{
    color:#003366;
    margin-bottom:10px;
}

#info{
    font-size:22px;
    font-weight:bold;
    color:#003366;
    margin-bottom:15px;
}

#tablero{
    width:85%;
    height:260px;
    background:#dff1ff;
    border:4px solid #5fa8d3;
    border-radius:20px;
    display:flex;
    align-items:center;
    gap:10px;
    padding:20px;
    overflow-x:auto;
    overflow-y:hidden;
    box-shadow:0 4px 10px rgba(0,0,0,0.2);
}

/* ===== FICHAS ===== */

.ficha{
    width:65px;
    height:125px;
    background:white;
    border:3px solid #222;
    border-radius:12px;
    display:flex;
    flex-direction:column;
    cursor:pointer;
    transition:0.2s;
    flex-shrink:0;
    overflow:hidden;
}

.ficha:hover{
    transform:scale(1.05);
}

.mitad{
    width:100%;
    height:50%;
    display:grid;
    grid-template-columns:repeat(3,1fr);
    grid-template-rows:repeat(3,1fr);
    padding:5px;
}

.mitad:first-child{
    border-bottom:2px solid black;
}

/* ===== PUNTOS ===== */

.punto{
    width:10px;
    height:10px;
    background:black;
    border-radius:50%;
    align-self:center;
    justify-self:center;
}

/* ===== FICHA OCULTA ===== */

.oculta{
    background:#003366;
    border-color:#001f33;
}

.oculta .mitad{
    display:block;
}

.oculta .mitad:first-child{
    border-bottom:2px solid #001f33;
}

/* ===== JUGADORES ===== */

#jugadores{
    width:100%;
    display:grid;
    grid-template-columns:repeat(4,1fr);
    gap:20px;
    margin-top:20px;
}

.mano{
    background:#dff1ff;
    border:3px solid #5fa8d3;
    border-radius:15px;
    padding:15px;
    min-height:220px;
    display:flex;
    flex-direction:column;
    align-items:center;
    box-shadow:0 4px 8px rgba(0,0,0,0.15);
}

.mano h3{
    margin-bottom:15px;
    color:#003366;
}

.cartas{
    display:flex;
    flex-wrap:wrap;
    justify-content:center;
    gap:8px;
}

button{
    margin-top:15px;
    padding:12px 25px;
    border:none;
    border-radius:12px;
    background:#5fa8d3;
    color:white;
    font-size:18px;
    font-weight:bold;
    cursor:pointer;
    transition:0.2s;
}

button:hover{
    background:#3b90c4;
}

</style>
</head>

<body>

<div id="mesa">

    <div>
        <h1>🎲 Juego de Dominó_JAURE_OK</h1>
        <div id="info"></div>
    </div>

    <div id="tablero"></div>

    <div>
        <button onclick="comerFicha()">
            Comer Ficha
        </button>

        <button onclick="pasarTurno()">
            Pasar Turno
        </button>
    </div>

    <div id="jugadores">

        <div class="mano">
            <h3>Jugador 1</h3>
            <div class="cartas" id="j1"></div>
        </div>

        <div class="mano">
            <h3>Jugador 2</h3>
            <div class="cartas" id="j2"></div>
        </div>

        <div class="mano">
            <h3>Jugador 3</h3>
            <div class="cartas" id="j3"></div>
        </div>

        <div class="mano">
            <h3>Jugador 4</h3>
            <div class="cartas" id="j4"></div>
        </div>

    </div>

</div>

<script>

/* =========================
   CREAR FICHAS
========================= */

let fichas = [];

for(let i=0;i<=6;i++){
    for(let j=i;j<=6;j++){
        fichas.push([i,j]);
    }
}

/* =========================
   MEZCLAR
========================= */

fichas.sort(()=>Math.random()-0.5);

/* =========================
   REPARTIR
========================= */

let jugadores = [
    fichas.splice(0,7),
    fichas.splice(0,7),
    fichas.splice(0,7),
    fichas.splice(0,7)
];

let tablero = [];

/* =========================
   BUSCAR MULA DE 6
========================= */

let turno = 0;

for(let i=0;i<4;i++){

    let index = jugadores[i].findIndex(
        ficha => ficha[0]===6 && ficha[1]===6
    );

    if(index !== -1){

        tablero.push([6,6]);

        jugadores[i].splice(index,1);

        turno = i + 1;

        if(turno > 3){
            turno = 0;
        }

        break;
    }
}

/* =========================
   POSICIONES DE PUNTOS
========================= */

const posiciones = {
    0: [],
    1: [4],
    2: [0,8],
    3: [0,4,8],
    4: [0,2,6,8],
    5: [0,2,4,6,8],
    6: [0,2,3,5,6,8]
};

/* =========================
   CREAR MITAD
========================= */

function crearMitad(numero){

    let mitad = document.createElement("div");
    mitad.className = "mitad";

    for(let i=0;i<9;i++){

        let celda = document.createElement("div");

        if(posiciones[numero].includes(i)){

            let punto = document.createElement("div");
            punto.className = "punto";

            celda.appendChild(punto);
        }

        mitad.appendChild(celda);
    }

    return mitad;
}

/* =========================
   RENDER
========================= */

function render(){

    document.getElementById("info").innerHTML =
    "Turno del Jugador " + (turno + 1);

    let tableroDiv = document.getElementById("tablero");
    tableroDiv.innerHTML = "";

    tablero.forEach(ficha=>{
        tableroDiv.appendChild(crearFicha(ficha,false,false));
    });

    for(let i=0;i<4;i++){

        let contenedor =
        document.getElementById("j"+(i+1));

        contenedor.innerHTML = "";

        jugadores[i].forEach((ficha,index)=>{

            let oculta = i !== turno;

            let fichaHTML =
            crearFicha(ficha,true,oculta);

            if(i===turno){

                fichaHTML.onclick = ()=>{
                    jugarFicha(i,index);
                };

            }else{

                fichaHTML.style.cursor = "default";
            }

            contenedor.appendChild(fichaHTML);
        });
    }
}

/* =========================
   CREAR FICHA HTML
========================= */

function crearFicha(ficha,clickable,oculta){

    let div = document.createElement("div");
    div.className = "ficha";

    if(oculta){
        div.classList.add("oculta");
    }

    if(!oculta){

        let arriba = crearMitad(ficha[0]);
        let abajo = crearMitad(ficha[1]);

        div.appendChild(arriba);
        div.appendChild(abajo);

    }else{

        let arriba = document.createElement("div");
        arriba.className = "mitad";

        let abajo = document.createElement("div");
        abajo.className = "mitad";

        div.appendChild(arriba);
        div.appendChild(abajo);
    }

    if(!clickable){
        div.style.cursor = "default";
    }

    return div;
}

/* =========================
   JUGAR FICHA
========================= */

function jugarFicha(jugador,index){

    let ficha = jugadores[jugador][index];

    let izquierda = tablero[0][0];
    let derecha = tablero[tablero.length-1][1];

    if(ficha[0]===derecha){

        tablero.push(ficha);

    }else if(ficha[1]===derecha){

        tablero.push([ficha[1],ficha[0]]);

    }

    else if(ficha[1]===izquierda){

        tablero.unshift(ficha);

    }else if(ficha[0]===izquierda){

        tablero.unshift([ficha[1],ficha[0]]);

    }else{

        alert("Movimiento inválido");
        return;
    }

    jugadores[jugador].splice(index,1);

    if(jugadores[jugador].length===0){

        alert("🏆 ¡Jugador " + (jugador+1) + " gana!");

        location.reload();
    }

    siguienteTurno();
}

/* =========================
   COMER FICHA
========================= */

function comerFicha(){

    if(fichas.length===0){

        alert("No quedan fichas para comer");
        return;
    }

    jugadores[turno].push(fichas.pop());

    render();
}

/* =========================
   TURNOS
========================= */

function siguienteTurno(){

    turno++;

    if(turno > 3){
        turno = 0;
    }

    render();
}

function pasarTurno(){
    siguienteTurno();
}

/* =========================
   INICIAR
========================= */

render();

</script>

</body>
</html>
